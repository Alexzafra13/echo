# =============================================
# Echo Music Server
# =============================================
#
# QUICK START:
#
#   1. Set your music paths below (look for ">>> YOUR MUSIC")
#   2. Run: docker compose up -d
#      (Passwords are auto-generated on first start)
#   3. Open: http://localhost:4567
#
# DOWNLOAD THIS FILE:
#   mkdir echo && cd echo
#   curl -O https://raw.githubusercontent.com/Alexzafra13/echo/main/docker-compose.yml
#
# SUPPORTED PLATFORMS:
#   - Linux (x86_64, ARM64)
#   - Raspberry Pi 3/4/5 (ARM64, minimum 2GB RAM)
#   - Synology NAS (DSM 7.2+ Container Manager)
#   - Windows / macOS (Docker Desktop)
#
# =============================================

services:
  echo:
    image: ghcr.io/alexzafra13/echo:latest
    container_name: echo
    ports:
      - "${ECHO_PORT:-4567}:4567"
    volumes:
      - ./data:/app/data

      # ===========================================
      #       >>> YOUR MUSIC - EDIT HERE <<<
      # ===========================================
      # Add the folders where your music is stored.
      # Format: /path/on/your/pc:/path/in/echo:ro
      # The :ro means read-only (recommended)
      #
      # EXAMPLES:
      # - /home/user/Music:/music:ro            # Linux
      # - /volume1/music:/music:ro              # Synology NAS
      # - /volume1/Media/Music:/media-music:ro  # Synology NAS
      # - /media/usb-drive:/usb:ro              # USB drive
      # - "D:/My Music:/music:ro"               # Windows
      #
      # By default /mnt and /media are mounted:
      - /mnt:/mnt:ro
      - /media:/media:ro
      # ===========================================

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-echo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-echo}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATA_PATH: /app/data
      ALLOWED_MUSIC_PATHS: /mnt,/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-network
    # Prevent infinite logs on disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: echo-postgres
    # Shared memory for better performance with complex operations
    shm_size: 128mb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-echo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-echo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-echo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: echo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  echo-network:
    name: echo-network

volumes:
  postgres_data:
  redis_data:
