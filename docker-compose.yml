# =============================================
# Echo Music Server
# =============================================
#
# QUICK START:
#
#   mkdir echo && cd echo
#   curl -O https://raw.githubusercontent.com/Alexzafra13/echo/main/docker-compose.yml
#   docker compose up -d
#   Open: http://localhost:4567
#
# That's it. No .env needed — passwords and secrets are
# auto-generated on first start.
#
# SUPPORTED PLATFORMS:
#   - Linux (x86_64, ARM64)
#   - Raspberry Pi 3/4/5 (ARM64, minimum 2GB RAM)
#   - Synology NAS (DSM 7.2+ Container Manager)
#   - Windows / macOS (Docker Desktop)
#
# =============================================

services:
  echo:
    image: ghcr.io/alexzafra13/echo:latest
    container_name: echo
    ports:
      - "${ECHO_PORT:-4567}:4567"
    volumes:
      - echo_data:/app/data

      # ===========================================
      #       >>> YOUR MUSIC - EDIT HERE <<<
      # ===========================================
      # Add the folders where your music is stored.
      # Format: /path/on/your/pc:/path/in/echo:ro
      # The :ro means read-only (recommended)
      #
      # EXAMPLES:
      #   - /home/user/Music:/music:ro            # Linux
      #   - /volume1/music:/music:ro              # Synology NAS
      #   - /volume1/Media/Music:/media-music:ro  # Synology NAS
      #   - /media/usb-drive:/usb:ro              # USB drive
      #   - "D:/My Music:/music:ro"               # Windows
      #
      # Uncomment and edit the line below:
      # - /your/music/folder:/music:ro
      # ===========================================

    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://echo:${POSTGRES_PASSWORD:-echo-internal-db}@postgres:5432/echo
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-echo-internal-cache}
      DATA_PATH: /app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echo-network

  postgres:
    image: postgres:16-alpine
    container_name: echo-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-echo-internal-db}
      POSTGRES_DB: echo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - echo-network

  redis:
    image: redis:7-alpine
    container_name: echo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-echo-internal-cache}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-echo-internal-cache}", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - echo-network

networks:
  echo-network:
    name: echo-network

volumes:
  echo_data:
  postgres_data:
  redis_data:
