# ============================================
# Nginx Configuration for Echo Music Server
# ============================================
# 1. Copy: sudo cp nginx/echo.conf /etc/nginx/sites-available/echo
# 2. Link: sudo ln -s /etc/nginx/sites-available/echo /etc/nginx/sites-enabled/
# 3. Edit: Change "music.yourdomain.com" to your domain
# 4. SSL:  sudo certbot --nginx -d your.domain.com
# 5. Test: sudo nginx -t && sudo systemctl reload nginx
# ============================================

# HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name music.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name music.yourdomain.com;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/music.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/music.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(), camera=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Logs
    access_log /var/log/nginx/echo_access.log;
    error_log /var/log/nginx/echo_error.log;

    # Upload size (for music files)
    client_max_body_size 100M;

    # Static assets (Vite generates hashed filenames)
    location /assets/ {
        proxy_pass http://localhost:4567;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to Echo
    location / {
        proxy_pass http://localhost:4567;

        # WebSocket support (required for Echo)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (audio playback can be long)
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
